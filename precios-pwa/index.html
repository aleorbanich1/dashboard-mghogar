<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MG Precios" />
    <meta name="description" content="Calculadora de precios diferenciados" />
    <title>MG Precios</title>
    <script>
      // Aplica el tema antes del primer paint para evitar flash de color.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var dark =
            t === 'dark' ||
            (t !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) {
            document.documentElement.classList.add('dark')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#0b1120')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
